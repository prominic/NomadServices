# Basic Jekyll settings
title: Nomad Services
description: Upload your NSF and test it in HCL Nomad — powered by Moonshine.dev
baseurl: ''
url: 'https://nomad.services'
repository: prominic/NomadServices

permalink: pretty

# Include files from root directory instead of just _includes/
includes_dir: '.'

defaults:
  - scope:
      path: 'docs'
      type: 'pages'
    values:
      layout: 'default'

exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - '*.gemspec'
  - '*.gem'
  - README.md

# Theme settings
theme: just-the-docs

# Theme customization
color_scheme: wider
search_enabled: true

# Aux links for header
aux_links:
  'Moonshine.dev':
    - 'https://www.moonshine.dev/'
  'Blog':
    - 'https://www.moonshine.dev/blog'
aux_links_new_tab: true

# Footer content
footer_content: 'Copyright &copy; 2025 <a href="https://www.prominic.net">Prominic.NET</a>. Powered by <a href="https://www.moonshine.dev/">Moonshine.dev</a>.'

# Back to top link
back_to_top: true
back_to_top_text: 'Back to top'

# Footer last edited timestamp
last_edit_timestamp: true
last_edit_time_format: '%b %e %Y at %I:%M %p'

# Footer "Edit this page on GitHub" link text
gh_edit_link: false
gh_edit_link_text: 'Edit this page on GitHub'
gh_edit_repository: 'https://github.com/prominic/NomadServices'
gh_edit_branch: 'main'
gh_edit_source: docs
gh_edit_view_mode: 'tree'

liquid:
  error_mode: strict
  strict_filters: true

# Markdown processor
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Sass
sass:
  style: compressed

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-github-metadata
  - jekyll-include-cache
  - jekyll-sitemap

# Disable heading anchors — they break inline HTML cards with nested <a> tags
heading_anchors: false

# For copy button on code
enable_copy_code_button: true

# Enable Mermaid diagrams
mermaid:
  version: '9.4.3'

# Callouts
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# SEO
lang: en-US
author:
  name: Prominic.NET
  url: https://www.prominic.net

compress_html:
  clippings: all
  comments: all
  endings: all
  startings: []
  blanklines: false
  profile: false
