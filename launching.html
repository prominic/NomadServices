<!--
  /launching.html is a client-side-only state: the analyze flow uses
  history.pushState to swap the URL to <appdir>/launching.html without a
  real navigation, then renders the report in-page. That URL has no
  server-side document, so a refresh (or a direct hit / shared link)
  would 404 on the backend.

  This page gives launching.html a real document whose only job is to send
  the user back to the home screen. The in-page pushState flow never loads
  this file (pushState doesn't trigger a request); it only runs on an
  actual server request — i.e. exactly the refresh case we want to fix.

  It's a flat .html file (not a /launching/ directory) on purpose: this
  host serves exact file paths and may not auto-resolve a directory index.
  The redirect target is "index.html" (same directory) so it resolves to
  the real home document regardless of where the site is mounted, with no
  reliance on directory-index behaviour. location.replace() is used so
  launching.html doesn't linger in history and trap the back button.

  Report data isn't persisted across reloads, so there's nothing to
  restore — we simply return home.
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="refresh" content="0; url=index.html">
  <link rel="canonical" href="index.html">
  <meta name="robots" content="noindex">
  <title>Redirecting&hellip;</title>
  <script>window.location.replace('index.html');</script>
</head>
<body>
  <p>Redirecting to the <a href="index.html">home page</a>&hellip;</p>
</body>
</html>
