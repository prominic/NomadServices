name: Publish Documentation

on:
  push:
    branches: ["main", "develop"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build main branch
        run: |
          bundle exec jekyll build --destination _site --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Checkout develop into subdirectory
        if: github.ref == 'refs/heads/develop'
        uses: actions/checkout@v6
        with:
          ref: develop
          path: develop-src

      - name: Build develop branch into /develop subfolder
        if: github.ref == 'refs/heads/develop'
        run: |
          bundle exec jekyll build --source develop-src --destination _site/develop --baseurl "${{ steps.pages.outputs.base_path }}/develop"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
